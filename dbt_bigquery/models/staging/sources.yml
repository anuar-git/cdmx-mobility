version: 2

sources:
  - name: meta_cdmx
    database: cdmx-mobility-prod
    schema: meta_cdmx
    description: Pipeline metadata — ingestion logs, dbt run results, GE results, freshness SLAs.
    tables:
      - name: ingestion_log
        description: One row per ingestor run. Written by IngestionLogger.log() in every ingestor.
        columns:
          - name: source
            description: Ingestor identifier (e.g. ecobici_station_status, metro_affluence).
          - name: run_id
            description: UUID4 generated at the start of each ingestor run.
          - name: file_count
          - name: byte_count
          - name: row_count
          - name: status
            description: success / error / skipped.
          - name: error_message
          - name: ingested_at
            description: UTC TIMESTAMP when the run completed. Partition column.

      - name: dbt_run_results
        description: >
          One row per dbt node (model/seed/snapshot) per DAG run.
          Written by upload_dbt_artifacts after dbt build completes.
        columns:
          - name: run_date
          - name: unique_id
          - name: node_name
          - name: node_schema
          - name: status
            description: success / error / warn / skip.
          - name: execution_ms
          - name: rows_affected
          - name: recorded_at

      - name: dbt_test_results
        description: One row per dbt test per DAG run. Written by upload_dbt_artifacts.
        columns:
          - name: run_date
          - name: unique_id
          - name: node_name
          - name: status
            description: pass / fail / warn / error.
          - name: failures
            description: Number of failing rows (0 = passed).
          - name: recorded_at

      - name: gx_validation_results
        description: >
          One row per Great Expectations suite per DAG run.
          Written by run_gx_validation after Spark Silver completes.
        columns:
          - name: run_date
          - name: suite_name
            description: e.g. silver_ecobici_state_changes.
          - name: table_name
          - name: success
          - name: evaluated_count
          - name: successful_count
          - name: unsuccessful_count
          - name: recorded_at

      - name: freshness_sla_log
        description: >
          One row per source per DAG run. Written by check_freshness_slas
          after dbt test completes. is_violated=TRUE triggers the Slack alert.
        columns:
          - name: source
            description: Canonical source name — ecobici / metro / metrobus / weather.
          - name: latest_ts
            description: MAX timestamp found in the Silver table at check time.
          - name: sla_minutes
          - name: lag_minutes
          - name: is_violated
          - name: checked_at

  - name: silver_cdmx
    database: cdmx-mobility-prod
    schema: silver_cdmx
    description: >
      Silver-layer external tables over Parquet written by Spark jobs.
      Partitioned by service_date (DATE, CDMX-local wall-clock day).
    tables:
      - name: ecobici_state_changes
        description: >
          Deduplicated EcoBici station state changes. One row per
          (snapshot_ts, station_id) where at least one field changed since the prior
          snapshot. Partitioned by service_date.
        columns:
          - name: snapshot_ts
            description: UTC timestamp of the GBFS snapshot where the change was first seen.
          - name: station_id
            description: EcoBici station identifier.
          - name: num_bikes_available
          - name: num_docks_available
          - name: is_renting
            description: 1=accepting returns, 0=not.
          - name: is_returning
            description: 1=accepting returns, 0=not.
          - name: last_reported
            description: Per-station epoch timestamp when the station last reported to the provider.
          - name: service_date
            description: CDMX-local date (UTC-6) of snapshot_ts. Hive partition column.

      - name: ecobici_station_master
        description: >
          Latest station_information snapshot — one row per station. No partitioning.
          Refreshed on every Spark run.
        columns:
          - name: station_id
          - name: name
          - name: lat
          - name: lon
          - name: capacity

      - name: metro_affluence
        description: >
          Daily metro entry counts per (service_date, linea, station_canonical).
          Partitioned by service_date. The Spark Silver job reads afluenciastc_simple_*.csv
          which contains one aggregate daily total per (fecha, linea, estacion) with no
          payment-type breakdown. tipo_pago is NOT in this table. For payment-type detail
          the afluenciastc_desglosado CSV would need a separate Silver job.
        columns:
          - name: service_date
            description: Date of the recorded entry count. Hive partition column.
          - name: linea
            description: >
              Metro line identifier after double-encoded UTF-8 mojibake fix,
              e.g. "Línea 1". Produced by the Spark _fix_encoding UDF.
          - name: station_raw
            description: Station name as it appeared in the source CSV (before canonicalization).
          - name: station_canonical
            description: Normalised station name after mojibake fix and variant lookup.
          - name: daily_entries
            description: Total daily entries for this station and line (all payment types combined).

      - name: metrobus_stop_events
        description: >
          Metrobús vehicle dwell events at stops. One row per continuous dwell session
          (vehicle at stop with no gap > SESSION_GAP_SECONDS). Partitioned by
          service_date and route_id.
        columns:
          - name: vehicle_id
          - name: stop_id
          - name: stop_name
          - name: route_id
          - name: trip_id
          - name: stop_sequence
          - name: dwell_start_ts
          - name: dwell_end_ts
          - name: dwell_seconds
          - name: service_date
            description: CDMX-local date of dwell_start_ts. Hive partition column.

      - name: weather_hourly_fact
        description: >
          Hourly weather observations for CDMX in wide format. The Spark job pivots
          from one row per coordinate to one row per UTC hour, producing per-coordinate
          columns ({coord}_{metric}) plus city-wide arithmetic averages and derived
          comfort features. Partitioned by service_date.
          Coordinates: centro, aeropuerto, pedregal, tlalnepantla, ecatepec.
        columns:
          - name: obs_timestamp
            description: >
              UTC timestamp of the observation hour (TIMESTAMP). This is the
              parsed form of the Open-Meteo "YYYY-MM-DDTHH:MM" string — the
              string column is dropped before writing to Parquet.
          - name: centro_temperature_2m
          - name: centro_precipitation
          - name: centro_windspeed_10m
          - name: centro_relativehumidity_2m
          - name: aeropuerto_temperature_2m
          - name: aeropuerto_precipitation
          - name: aeropuerto_windspeed_10m
          - name: aeropuerto_relativehumidity_2m
          - name: pedregal_temperature_2m
          - name: pedregal_precipitation
          - name: pedregal_windspeed_10m
          - name: pedregal_relativehumidity_2m
          - name: tlalnepantla_temperature_2m
          - name: tlalnepantla_precipitation
          - name: tlalnepantla_windspeed_10m
          - name: tlalnepantla_relativehumidity_2m
          - name: ecatepec_temperature_2m
          - name: ecatepec_precipitation
          - name: ecatepec_windspeed_10m
          - name: ecatepec_relativehumidity_2m
          - name: avg_temperature_2m
            description: Arithmetic mean of temperature_2m across all five coordinates (°C).
          - name: avg_precipitation
            description: Arithmetic mean of precipitation across all five coordinates (mm).
          - name: avg_windspeed_10m
            description: Arithmetic mean of windspeed_10m across all five coordinates (m/s).
          - name: avg_relativehumidity_2m
            description: Arithmetic mean of relative humidity across all five coordinates (%).
          - name: heat_index
            description: Rothfusz heat index in Celsius applied to city-wide avg temperature and humidity.
          - name: precipitation_flag
            description: Boolean — true if avg_precipitation > 0.1mm.
          - name: wind_category
            description: Simplified Beaufort category (calm / breeze / strong).
          - name: comfort_score
            description: Composite 0–100 comfort index.
          - name: service_date
            description: UTC date derived from obs_timestamp. Hive partition column.

  - name: raw_cdmx
    database: cdmx-mobility-prod
    schema: raw_cdmx
    tables:
      - name: ecobici_station_status
        description: >
          External table over GCS GBFS station_status.json snapshots polled every 2 minutes.
          Partitioned by ingestion_ts (STRING, format YYYY-MM-DDTHH-MM).
          data column is native JSON containing the GBFS stations array.
        columns:
          - name: last_updated
            description: Unix timestamp when the GBFS feed was last updated by the provider.
          - name: ttl
            description: Recommended polling interval in seconds from the GBFS feed.
          - name: data
            description: Raw GBFS data envelope (JSON) containing the stations array.
          - name: ingestion_ts
            description: Hive partition — UTC minute the snapshot was landed (YYYY-MM-DDTHH-MM).

      - name: ecobici_station_information
        description: >
          External table over GCS GBFS station_information.json snapshots (polled daily).
          Partitioned by ingestion_date (DATE).
          data column is native JSON containing the GBFS stations array.
        columns:
          - name: last_updated
            description: Unix timestamp when the GBFS feed was last updated by the provider.
          - name: ttl
            description: Recommended polling interval in seconds from the GBFS feed.
          - name: data
            description: Raw GBFS data envelope (JSON) containing the stations array.
          - name: ingestion_date
            description: Hive partition — date the snapshot was landed in GCS.

      - name: ecobici_system_alerts
        description: >
          External table over GCS GBFS system_alerts.json snapshots polled every 2 minutes.
          Partitioned by ingestion_ts (STRING, format YYYY-MM-DDTHH-MM).
        columns:
          - name: last_updated
            description: Unix timestamp when the GBFS feed was last updated by the provider.
          - name: ttl
            description: Recommended polling interval in seconds.
          - name: data
            description: Raw GBFS data envelope (JSON) containing the alerts array.
          - name: ingestion_ts
            description: Hive partition — UTC minute the snapshot was landed (YYYY-MM-DDTHH-MM).

      # ── Metrobús / SEMOVI GTFS static ────────────────────────────────────────

      - name: metrobus_stops
        description: >
          GTFS stops.txt from the unified SEMOVI CDMX static feed (covers Metrobús, Metro, etc.).
          External CSV table partitioned by ingestion_date (DATE).
        columns:
          - name: stop_id
            description: Unique stop identifier.
          - name: stop_code
            description: Short public-facing code (may be null).
          - name: stop_name
            description: Human-readable stop name.
          - name: stop_lat
            description: WGS-84 latitude.
          - name: stop_lon
            description: WGS-84 longitude.
          - name: location_type
            description: 0=stop, 1=station, 2=entrance (GTFS enum).
          - name: parent_station
            description: stop_id of the parent station (for entrances/platforms).
          - name: ingestion_date
            description: Hive partition — date the ZIP was downloaded.

      - name: metrobus_routes
        description: >
          GTFS routes.txt from the unified SEMOVI CDMX static feed.
          External CSV table partitioned by ingestion_date (DATE).
        columns:
          - name: route_id
            description: Unique route identifier.
          - name: route_short_name
            description: Short public name (e.g. "1", "2", "Cablebús L1").
          - name: route_long_name
            description: Full descriptive name of the route.
          - name: route_type
            description: GTFS mode enum (3=bus, 5=cable car, etc.).
          - name: route_color
            description: Hex colour for map rendering (without #).
          - name: route_text_color
            description: Hex colour for text on the route colour background.
          - name: ingestion_date
            description: Hive partition — date the ZIP was downloaded.

      - name: metrobus_trips
        description: >
          GTFS trips.txt from the unified SEMOVI CDMX static feed.
          External CSV table partitioned by ingestion_date (DATE).
        columns:
          - name: route_id
          - name: service_id
          - name: trip_id
          - name: trip_headsign
          - name: direction_id
          - name: shape_id
          - name: ingestion_date

      - name: metrobus_stop_times
        description: >
          GTFS stop_times.txt — scheduled arrivals/departures for every stop on every trip.
          Largest feed (~hundreds of thousands of rows). External CSV table partitioned by ingestion_date.
        columns:
          - name: trip_id
          - name: arrival_time
            description: HH:MM:SS — may exceed 24:00:00 for trips past midnight.
          - name: departure_time
          - name: stop_id
          - name: stop_sequence
          - name: ingestion_date

      - name: metrobus_calendar
        description: >
          GTFS calendar.txt — service schedule by day-of-week.
          External CSV table partitioned by ingestion_date (DATE).
        columns:
          - name: service_id
          - name: monday
          - name: tuesday
          - name: wednesday
          - name: thursday
          - name: friday
          - name: saturday
          - name: sunday
          - name: start_date
          - name: end_date
          - name: ingestion_date

      - name: metrobus_shapes
        description: >
          GTFS shapes.txt — route polyline geometry as ordered lat/lon sequences.
          External CSV table partitioned by ingestion_date (DATE).
        columns:
          - name: shape_id
          - name: shape_pt_lat
          - name: shape_pt_lon
          - name: shape_pt_sequence
          - name: ingestion_date

      # ── Metrobús GTFS-Realtime ────────────────────────────────────────────────

      - name: metrobus_vehicle_positions
        description: >
          GTFS-RT vehicle positions polled every 30 seconds (~2,880 NDJSON snapshots/day).
          External NDJSON table partitioned by ingestion_date (DATE).
          The vehicle column holds the full VehiclePosition proto serialised as JSON.
        columns:
          - name: id
            description: GTFS-RT FeedEntity ID.
          - name: vehicle
            description: VehiclePosition proto as JSON (trip, position, current_status, vehicle descriptor).
          - name: _snapshot_ts
            description: UTC wall-clock TIMESTAMP of the poll that produced this record.
          - name: ingestion_date
            description: Hive partition — UTC date of the poll.
