version: 2

models:
  - name: stg_ecobici_station_information
    description: >
      One row per station per daily snapshot of GBFS station_information.json.
      Contains static reference data: location, name, and dock capacity.
    columns:
      - name: ingestion_date
        description: Date the snapshot was landed in GCS (Hive partition).
        tests:
          - not_null
      - name: station_id
        description: GBFS station identifier.
        tests:
          - not_null
      - name: name
        description: Human-readable station name.
        tests:
          - not_null
      - name: short_name
        description: Short station code or abbreviation (may be null for some stations).
      - name: lat
        description: Station latitude in decimal degrees.
        tests:
          - not_null
      - name: lon
        description: Station longitude in decimal degrees.
        tests:
          - not_null
      - name: capacity
        description: Total number of docks (bikes + empty) at the station.
        tests:
          - not_null
