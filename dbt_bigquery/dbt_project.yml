name: 'cdmx_mobility'
version: '1.0.0'

profile: 'cdmx_mobility'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  cdmx_mobility:
    +schema: seeds_cdmx

snapshots:
  cdmx_mobility:
    +target_schema: snapshots_cdmx

models:
  cdmx_mobility:
    staging:
      +materialized: view
      +schema: staging_cdmx
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts_cdmx
      core:
        +materialized: table
        +schema: marts_cdmx
      mobility:
        +materialized: table
        +schema: marts_cdmx
