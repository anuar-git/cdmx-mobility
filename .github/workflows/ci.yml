name: CI

on:
  schedule:
    - cron: '0 12 * * *'  # 06:00 CDMX (UTC-6) — after CKAN daily publish window
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11.9

      - name: Install dependencies
        run: uv sync --group spark

      - name: Run ruff
        run: uv run ruff check .

      - name: Run ruff format
        run: uv run ruff format --check .

      - name: Run sqlfluff
        run: uv run sqlfluff lint dbt_bigquery/models --dialect bigquery

      - name: Run pytest
        run: uv run pytest tests/ -v

      - name: dbt parse (validates SQL syntax and DAG without BigQuery connection)
        working-directory: dbt_bigquery
        run: uv run dbt parse

  terraform-validate:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform fmt
        run: cd infra && terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: cd infra && terraform init -backend=false

      - name: Terraform validate
        run: cd infra && terraform validate

  gcp-auth-smoke-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Verify auth
        run: gcloud auth list && gcloud config list

  ingest-metro:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11.9

      - name: Install dependencies
        run: uv sync --no-dev --frozen

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Ingest metro affluence
        env:
          CDMX_GCP_PROJECT_ID: cdmx-mobility-prod
          CDMX_RAW_BUCKET_NAME: cdmx-mobility-data
        run: uv run python main.py ingest-metro-affluence

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Upload Spark jobs to GCS
        run: |
          cd spark_jobs
          zip -r conformance.zip conformance/
          cd ..
          zip -r ingestion.zip ingestion/
          gsutil -m cp spark_jobs/*.py gs://cdmx-mobility-data/code/spark_jobs/
          gsutil cp spark_jobs/conformance.zip gs://cdmx-mobility-data/code/spark_jobs/conformance.zip
          gsutil cp ingestion.zip gs://cdmx-mobility-data/code/spark_jobs/ingestion.zip

      - name: Build and push ingestor image
        env:
          IMAGE: us-central1-docker.pkg.dev/cdmx-mobility-prod/ingestor/ingestor
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
