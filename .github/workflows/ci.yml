name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11.9

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run ruff
        run: uv run ruff check .

      - name: Run black
        run: uv run black --check .

      - name: Run sqlfluff
        run: uv run sqlfluff lint dbt_bigquery/models --dialect bigquery

      - name: Run pytest
        run: uv run pytest tests/ -v

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform fmt
        run: cd infra && terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: cd infra && terraform init -backend=false

      - name: Terraform validate
        run: cd infra && terraform validate

  gcp-auth-smoke-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Verify auth
        run: gcloud auth list && gcloud config list

  ingest-metrobus-static:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run Metrobús GTFS static ingestor
        env:
          CDMX_GCP_PROJECT_ID: cdmx-mobility-prod
          CDMX_RAW_BUCKET_NAME: cdmx-mobility-raw
          CDMX_METROBUS_GTFS_STATIC_DATASET_ID: gtfs
        run: uv run python main.py ingest-metrobus-gtfs-static

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push ingestor image
        env:
          IMAGE: us-central1-docker.pkg.dev/cdmx-mobility-prod/ingestor/ingestor
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
