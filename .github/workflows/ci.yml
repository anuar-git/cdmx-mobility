name: CI

on:
  schedule:
    - cron: '0 12 * * *'  # 06:00 CDMX (UTC-6) — after CKAN daily publish window
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation
  pages: write      # required for GitHub Pages deployment (dbt-docs job)

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11.9

      - name: Install dependencies
        run: uv sync --group spark

      - name: Run ruff
        run: uv run ruff check .

      - name: Run ruff format
        run: uv run ruff format --check .

      - name: Run sqlfluff
        run: uv run sqlfluff lint dbt_bigquery/models --dialect bigquery

      - name: Run pytest
        run: uv run pytest tests/ -v

      - name: Create dbt profile (offline — parse only, no BigQuery connection)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          cdmx_mobility:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: cdmx-mobility-prod
                dataset: marts_cdmx
                threads: 1
                timeout_seconds: 300
                location: US
          EOF

      - name: dbt deps (install dbt packages before parse)
        working-directory: dbt_bigquery
        run: uv run dbt deps

      - name: dbt parse (validates SQL syntax and DAG without BigQuery connection)
        working-directory: dbt_bigquery
        run: uv run dbt parse

  terraform-validate:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform fmt
        run: cd infra && terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: cd infra && terraform init -backend=false

      - name: Terraform validate
        run: cd infra && terraform validate

  gcp-auth-smoke-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Verify auth
        run: gcloud auth list && gcloud config list

  ingest-metro:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11.9

      - name: Install dependencies
        # Exclude spark — only base ingestion deps needed here.
        run: uv sync --no-dev --no-group spark --frozen

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Ingest metro affluence
        env:
          CDMX_GCP_PROJECT_ID: cdmx-mobility-prod
          CDMX_RAW_BUCKET_NAME: cdmx-mobility-data
        run: uv run python main.py ingest-metro-affluence

  validate-dags:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Airflow + providers (no extras that need GCP auth)
        run: |
          pip install --quiet \
            "apache-airflow==2.9.3" \
            "apache-airflow-providers-google==10.22.0" \
            "apache-airflow-providers-slack==8.8.0" \
            "apache-airflow-providers-http==4.13.0" \
            "great-expectations==1.3.10" \
            "dbt-bigquery==1.9.0" \
            "pyyaml"

      - name: Parse DAGs (import + DagBag validation)
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
          AIRFLOW__CORE__DAGS_FOLDER: orchestration/airflow/dags
          # Disable DB check — we only want import-time validation.
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////tmp/airflow_ci.db
        run: |
          airflow db init 2>/dev/null
          # The DAG inserts orchestration/airflow/scripts/ into sys.path at import
          # time. Pre-add it so the DagBag loader resolves the path correctly from
          # the repo root even without a running Airflow VM.
          export PYTHONPATH="${PYTHONPATH}:orchestration/airflow/scripts"
          python - <<'EOF'
          import sys
          from airflow.models import DagBag

          bag = DagBag(dag_folder="orchestration/airflow/dags", include_examples=False)
          errors = bag.import_errors
          if errors:
              for dag_file, err in errors.items():
                  print(f"ERROR in {dag_file}:\n{err}", file=sys.stderr)
              sys.exit(1)

          expected = {
              "daily_mobility_pipeline",
              "hourly_realtime_pipeline",
              "weekly_backfill_check",
          }
          found = set(bag.dags.keys())
          missing = expected - found
          if missing:
              print(f"ERROR: DAGs not found in DagBag: {missing}", file=sys.stderr)
              sys.exit(1)

          print(f"OK: {len(found)} DAGs loaded — {sorted(found)}")
          EOF

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Upload Spark jobs to GCS
        run: |
          zip -r spark_jobs.zip spark_jobs/
          zip -r ingestion.zip ingestion/
          gsutil -m cp spark_jobs/*.py gs://cdmx-mobility-data/code/spark_jobs/
          gsutil cp spark_jobs.zip gs://cdmx-mobility-data/code/spark_jobs/spark_jobs.zip
          gsutil cp ingestion.zip gs://cdmx-mobility-data/code/spark_jobs/ingestion.zip

      - name: Build and push ingestor image
        env:
          IMAGE: us-central1-docker.pkg.dev/cdmx-mobility-prod/ingestor/ingestor
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Build and push pipeline-api image
        env:
          IMAGE: us-central1-docker.pkg.dev/cdmx-mobility-prod/ingestor/pipeline-api
        run: |
          docker build -f api/Dockerfile \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  dashboard-typecheck:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package.json

      - name: Install dependencies
        run: npm install

      # next build generates next-env.d.ts (required for JSX types), runs the
      # TypeScript compiler, and validates all pages. Replaces a separate
      # tsc --noEmit step which would fail because next-env.d.ts doesn't exist
      # before the first build. force-dynamic on the pipeline page prevents
      # Next.js from fetching the live API during static generation.
      - name: Build (generates types, type-checks, validates all pages)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  dbt-docs:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11.9

      - name: Install dbt dependencies
        run: uv sync --group spark

      - name: Create dbt profile (offline — generates docs without BQ connection)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          cdmx_mobility:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: cdmx-mobility-prod
                dataset: marts_cdmx
                threads: 1
                timeout_seconds: 300
                location: US
          EOF

      - name: dbt deps + docs generate
        working-directory: dbt_bigquery
        run: |
          uv run dbt deps
          uv run dbt docs generate --no-compile

      - name: Upload dbt docs as GitHub Pages artifact
        id: pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dbt_bigquery/target/
