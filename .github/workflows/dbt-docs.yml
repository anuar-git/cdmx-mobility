name: dbt-docs

on:
  push:
    branches: [main]
    paths:
      - 'dbt_bigquery/**'
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for peaceiris/actions-gh-pages push
      id-token: write   # required for google-github-actions/auth WIF

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11.9

      - name: Install dependencies
        run: uv sync   # default group only — spark group not needed for docs

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          cdmx_mobility:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth          # uses ADC set by google-github-actions/auth
                project: cdmx-mobility-prod
                dataset: marts_cdmx
                threads: 4
                timeout_seconds: 300
                location: US
          EOF

      - name: Install dbt packages
        working-directory: dbt_bigquery
        run: uv run dbt deps

      - name: Generate dbt docs
        working-directory: dbt_bigquery
        # --no-compile: skips SQL compilation (not needed for docs);
        # dbt parse still runs to produce manifest.json with full DAG metadata.
        # BigQuery catalog.json is generated via information_schema queries
        # using the oauth credentials from the auth step above.
        run: uv run dbt docs generate --no-compile

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dbt_bigquery/target
          destination_dir: dbt-docs
