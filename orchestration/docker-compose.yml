x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
  AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "30"
  # Remote log storage in GCS — uses VM's ADC (no key file).
  AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
  AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: "gs://cdmx-mobility-data/airflow-logs"
  AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: google_cloud_default
  # GCP connection is resolved via ADC on the VM; no explicit credentials block needed.
  AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: "google-cloud-platform://?project=cdmx-mobility-prod"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_DB: airflow
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    env_file: .env
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname Admin
          --role Admin
          --email anuar.hage@gmail.com || true
      "
    volumes:
      - ../dbt_bigquery:/opt/dbt_bigquery:ro
      - ./airflow/dags:/opt/airflow/dags:ro
      - airflow-logs:/opt/airflow/logs

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    environment:
      <<: *airflow-env
    env_file: .env
    volumes:
      - ../dbt_bigquery:/opt/dbt_bigquery
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/config:/opt/airflow/config:ro
      - ./airflow/scripts:/opt/airflow/scripts:ro
      - airflow-logs:/opt/airflow/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--limit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-env
    env_file: .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/config:/opt/airflow/config:ro
      - airflow-logs:/opt/airflow/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

secrets:
  db_password:
    file: .db_password

volumes:
  postgres-data:
  airflow-logs:
